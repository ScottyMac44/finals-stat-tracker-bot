name: Deploy Bot to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into EC2, pull code, and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            # Detect the actual deploy directory; fail loudly if neither exists.
            if [ -d /home/admin/finals-scoreboard-tracker/.git ]; then
              DEPLOY_DIR=/home/admin/finals-scoreboard-tracker
            elif [ -d /home/admin/finals-stats-tracker-bot/.git ]; then
              DEPLOY_DIR=/home/admin/finals-stats-tracker-bot
            else
              echo "ERROR: Could not find repo directory on EC2."
              exit 1
            fi

            cd "$DEPLOY_DIR"
            echo "Deploying from: $(pwd)"

            # Ensure server code exactly matches origin/main.
            git fetch --prune origin
            git checkout main
            git reset --hard origin/main

            # Install updated dependencies when a venv exists in the project.
            if [ -d .venv ]; then
              . .venv/bin/activate
              python -m pip install -r requirements.txt
            fi

            # -n prevents hanging if sudo needs an interactive password.
            sudo -n systemctl restart finalsbot.service
            sudo -n systemctl --no-pager status finalsbot.service -n 25